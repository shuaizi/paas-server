# This rule is not used by the project paas-server itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the test.kubeassemble.cn.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: paas-server
    app.kubernetes.io/managed-by: kustomize
  name: guide-editor-role
rules:
- apiGroups:
  - test.kubeassemble.cn
  resources:
  - guides
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - test.kubeassemble.cn
  resources:
  - guides/status
  verbs:
  - get
